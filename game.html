      --accent-purple: #9d00ff;

    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(0, 209, 255, 0.1) 0%, transparent 20%),
        radial-gradient(circle at 80% 80%, rgba(157, 0, 255, 0.1) 0%, transparent 20%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* 返回按钮（和首页风格统一） */
    .back-btn {
      display: inline-block;
      padding: 10px 25px;
      background: var(--bg-card);
      border: 1px solid rgba(0,209,255,0.2);
      border-radius: 30px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 16px;
      margin: 20px 0;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* 详情卡片（和首页卡片风格统一） */
    .game-detail-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 40px;
      border: 1px solid rgba(0,209,255,0.3);
      box-shadow: 0 0 40px rgba(0,209,255,0.1);
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .game-detail-cover {
      width: 400px;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .game-detail-info {
      flex: 1;
      min-width: 300px;
    }

    .game-detail-title {
      font-size: 32px;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .game-detail-type {
      display: inline-block;
      padding: 5px 15px;
      background: rgba(0,209,255,0.1);
      color: var(--accent-blue);
      border-radius: 15px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .game-detail-desc {
      line-height: 1.8;
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }

    /* 下载按钮容器（分开展示，不同网盘不同渐变） */
    .download-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .download-btn {
      display: block;
      padding: 15px 40px;
      border-radius: 30px;
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      transition: all 0.3s ease;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0,209,255,0.5);
    }

        height: auto;
      }

    }

    // 从URL获取游戏ID，找到对应游戏
    function getGameFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const gameId = parseInt(urlParams.get('id') || '0');
      return games.find(g => g.id === gameId) || null;
    }

    // 渲染游戏详情
    function renderGameDetail() {
      const game = getGameFromUrl();
      const card = document.getElementById("gameDetailCard");
      
      if (!game) {
        card.innerHTML = '<p style="flex: 1; text-align: center; color: var(--text-secondary);">未找到该游戏的详情</p>';
        return;
      }

      // 构建下载按钮HTML（有几个链接就生成几个，缺失自动隐藏）
      let downloadHtml = '';
      if (game.kuake) {
        downloadHtml += `<a href="${game.kuake}" target="_blank" class="download-btn kuake-btn">夸克网盘下载</a>`;
      }
      if (game.baidu) {
        downloadHtml += `<a href="${game.baidu}" target="_blank" class="download-btn baidu-btn">百度网盘下载</a>`;
      }
      if (game.xunlei) {
        downloadHtml += `<a href="${game.xunlei}" target="_blank" class="download-btn xunlei-btn">迅雷云盘下载</a>`;
      }

      // 渲染完整卡片
      card.innerHTML = `
        <img src="${game.cover}" alt="${game.title}" class="game-detail-cover">
        <div class="game-detail-info">
          <h1 class="game-detail-title">${game.title}</h1>
          <span class="game-detail-type">${game.type}</span>
          <p class="game-detail-desc">${game.desc}</p>
          <div class="download-buttons">
            ${downloadHtml}
          </div>
        </div>
      `;

      // 设置页面标题
      document.title = `${game.title} | HyperWave 超波`;
    }

    // 页面加载完成后渲染
    window.onload = renderGameDetail;
