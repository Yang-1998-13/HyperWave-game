<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperWave 超波 | 游戏资源空间站</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.png"> <!-- 网站图标 -->
</head>
<body>

<!-- 顶部导航栏 -->
<header class="hw-header">
  <div class="container">
    <!-- 修复：图片LOGO，添加alt+错误处理+尺寸限制 -->
    <div class="logo">
      <img 
        src="./logo.png" 
        alt="HyperWave 超波" 
        class="logo-img"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      >
      <!-- 备用文字LOGO（图片加载失败时显示） -->
      <div class="logo-text-fallback">
        <span class="logo-text">HYPERWAVE</span>
        <span class="logo-sub">超波</span>
      </div>
    </div>
    <!-- 导航栏其他代码不变 -->
  </div>
</header>
    <div class="logo">
      <img src="logo.png" alt="HyperWave 超波" class="logo-img">
    </div>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link active">首页</a>
      <a href="speed.html" class="nav-link">网速测试</a>
      <!-- 资源分类下拉菜单 -->
      <div class="dropdown">
        <a href="#" class="nav-link dropdown-toggle">资源分类</a>
        <div class="dropdown-menu">
          <a href="#" data-type="all">全部资源</a>
          <a href="#" data-type="动作">动作</a>
          <a href="#" data-type="冒险">冒险</a>
          <a href="#" data-type="射击">射击</a>
          <a href="#" data-type="休闲">休闲</a>
          <a href="#" data-type="体育">体育</a>
          <a href="#" data-type="竞速">竞速</a>
          <a href="#" data-type="恐怖">恐怖</a>
        </div>
      </div>
      <a href="about.html" class="nav-link">关于我们</a>
    </nav>
  </div>
</header>

<!-- 英雄区（保留中间大标题） -->
<section class="hw-hero">
  <div class="container">
    <div class="hero-content">
      <h1 class="hero-title">HyperWave 超波</h1>
      <p class="hero-desc">探索无限游戏宇宙，获取最新资源、MOD与补丁</p>
      <div class="hero-search">
        <input type="text" id="search" placeholder="搜索游戏 / MOD / 补丁...">
        <button class="search-btn">🔍 搜索</button>
      </div>
    </div>
  </div>
</section>

<!-- 分类导航（更新为新分类） -->
<section class="hw-category">
  <div class="container">
    <button class="category-btn active" data-type="all">全部资源</button>
    <button class="category-btn" data-type="动作">动作</button>
    <button class="category-btn" data-type="冒险">冒险</button>
    <button class="category-btn" data-type="射击">射击</button>
    <button class="category-btn" data-type="休闲">休闲</button>
    <button class="category-btn" data-type="体育">体育</button>
    <button class="category-btn" data-type="竞速">竞速</button>
    <button class="category-btn" data-type="恐怖">恐怖</button>
  </div>
</section>

<!-- 游戏资源列表 -->
<main class="container">
  <div class="hw-game-grid" id="gameList"></div>
</main>

<!-- 底部 -->
<footer class="hw-footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo">HYPERWAVE 超波</div>
      <p class="footer-desc">© 2025 HyperWave 超波 | 仅供学习交流使用，禁止商用</p>
      <div class="footer-links">
        <a href="#">隐私政策</a>
        <a href="#">使用条款</a>
        <a href="about.html">联系我们</a>
      </div>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
