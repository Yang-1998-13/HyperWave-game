<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>HyperWave 超波 · 游戏资源站</title>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <h1>HYPERWAVE</h1>
            <span>超波</span>
        </div>
        <div class="nav-links">
            <a href="#"><i class="fas fa-home"></i> 首页</a>
            <a href="#" id="speedTestBtn"><i class="fas fa-tachometer-alt"></i> 网速测试</a>
            <a href="#" id="resourceCatBtn"><i class="fas fa-layer-group"></i> 资源分类</a>
            <a href="#" id="aboutBtn"><i class="fas fa-info-circle"></i> 关于我们</a>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h2>探索无限游戏宇宙</h2>
        <p>获取最新资源、MOD与补丁 · 极速下载 一触即达</p>
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索游戏 / MOD / 补丁...">
            <button id="searchBtn"><i class="fas fa-arrow-right"></i> 搜索</button>
        </div>
    </div>

    <!-- 分类导航 -->
    <div class="category-section">
        <div class="cat-title">
            <i class="fas fa-tags"></i> <span style="font-weight: 600;">全部资源 · 分类筛选</span>
        </div>
        <div class="category-list" id="categoryContainer">
            <!-- 动态生成分类按钮 -->
        </div>
    </div>

    <!-- 游戏卡片网格 -->
    <div id="gamesGrid" class="games-grid"></div>

    <!-- 页脚 -->
    <div class="footer-note">
        <i class="fas fa-bolt" style="color: #3f9eff;"></i> HyperWave 超波 · 每一次点击都是新次元
    </div>
</div>

<!-- 详情模态框 -->
<div class="modal-overlay" id="gameModal">
    <div class="modal-content">
        <button class="modal-close" id="closeModalBtn"><i class="fas fa-times-circle"></i></button>
        <div id="modalBody">
            <!-- 动态注入内容 -->
        </div>
    </div>
</div>

<!-- 引入游戏数据与交互脚本 -->
<script src="script.js"></script>
</body>
</html>
