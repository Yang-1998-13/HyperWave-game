      --text-secondary: #a0a0b0;
      --accent-blue: #00d1ff;

    body {

      color: var(--text-primary);
      background-image:

    }

    .container {

      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

      background-color: rgba(10, 10, 18, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 209, 255, 0.2);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .hw-header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 18px;
      color: var(--text-secondary);
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .nav-link {
      color: var(--text-primary);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-link:hover {
      color: var(--accent-blue);
    }

    .nav-link.active {
      color: var(--accent-blue);
    }

    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-gradient);
      border-radius: 2px;
    }

    /* 下拉菜单样式 */
    .dropdown {
      position: relative;
    }

    .dropdown-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background-color: var(--bg-card);
      border: 1px solid rgba(0, 209, 255, 0.3);
      border-radius: 10px;
      padding: 10px 0;
      min-width: 150px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.3s ease;
      z-index: 9999;
    }

    .dropdown:hover .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-menu a {
      display: block;
      padding: 10px 20px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .dropdown-menu a:hover {
      background-color: rgba(0, 209, 255, 0.1);
      color: var(--accent-blue);
      padding-left: 25px;
    }

    /* 英雄区样式（完全还原最初） */
    .hw-hero {
      padding: 80px 0;
      text-align: center;
    }

    .hero-content {
      max-width: 800px;
      margin: 0 auto;
    }

    .hero-title {
      font-size: 64px;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .hero-desc {
      font-size: 20px;
      color: var(--text-secondary);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .hero-search {
      display: flex;
      gap: 10px;
      max-width: 600px;
      margin: 0 auto;
    }

    .hero-search input {
      flex: 1;
      padding: 15px 20px;
      background-color: var(--bg-card);
      border: 1px solid rgba(0, 209, 255, 0.3);
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    .hero-search input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 20px rgba(0, 209, 255, 0.2);
    }

    .search-btn {
      padding: 15px 30px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .search-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 25px rgba(0, 209, 255, 0.4);
    }

    /* 分类导航样式（完全还原最初） */
    .hw-category {
      padding: 20px 0;

      gap: 15px;
      justify-content: center;
    }

    .category-btn {
      padding: 10px 25px;
      background-color: var(--bg-card);
      border: 1px solid rgba(0, 209, 255, 0.2);
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;

    .category-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .category-btn.active {
      background: var(--accent-gradient);
      border-color: transparent;
      color: var(--text-primary);
    }

    /* 游戏列表网格样式（完全还原最初） */
    .hw-game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      padding: 20px 0 80px;
    }

    .game-card {
      background-color: var(--bg-card);
      border: 1px solid rgba(0, 209, 255, 0.2);
      border-radius: 15px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .game-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent-blue);
      box-shadow: 0 15px 30px rgba(0, 209, 255, 0.2);
    }

    .game-cover {

      height: 200px;
      object-fit: cover;
      border-bottom: 1px solid rgba(0, 209, 255, 0.2);
    }

    }

      font-weight: 700;
      margin-bottom: 10px;

// DOM元素获取
const gameList = document.getElementById("gameList");
const searchInput = document.getElementById("search");
const categoryBtns = document.querySelectorAll(".category-btn");
const dropdownLinks = document.querySelectorAll(".dropdown-menu a");

// 渲染游戏列表（完全还原最初样式）
function renderGameList(filteredGames) {
  gameList.innerHTML = "";
  if (!filteredGames || filteredGames.length === 0) {
    gameList.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-size: 18px; padding: 50px 0;'>暂无相关资源</p>";
    return;
  }
  filteredGames.forEach(game => {
    const card = document.createElement("div");
    card.className = "game-card";
    card.innerHTML = `
      <img src="${game.cover}" alt="${game.title}" class="game-cover" loading="lazy">
      <div class="game-info">
        <h3 class="game-title">${game.title}</h3>
        <span class="game-type">${game.type}</span>
        <a href="game.html?id=${game.id}" class="detail-btn">查看详情</a>
      </div>
    `;
    gameList.appendChild(card);
  });
}

// 搜索功能
searchInput.addEventListener("input", () => {
  const keyword = searchInput.value.toLowerCase().trim();
  const filteredGames = games.filter(game => 
    game.title.toLowerCase().includes(keyword) || 
    game.type.toLowerCase().includes(keyword)
  );
  renderGameList(filteredGames);
  
  // 同步分类按钮状态
  categoryBtns.forEach(btn => btn.classList.remove("active"));
  document.querySelector('.category-btn[data-type="all"]').classList.add("active");
});

// 分类按钮筛选
categoryBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    // 重置激活状态
    categoryBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    
    const type = btn.dataset.type;
    const filteredGames = type === "all" ? games : games.filter(game => game.type === type);
    renderGameList(filteredGames);
  });
});

// 下拉菜单联动筛选
dropdownLinks.forEach(link => {
  链接.addEventListener("click", (e) => {
    e.preventDefault();
    const type = 链接.dataset.type;
    
    // 同步分类按钮
    categoryBtns.forEach(btn => {
      btn.classList.toggle("active", btn.dataset.type === type);
    });
    
    // 筛选游戏
    const filteredGames = type === "all" ? games : games.filter(game => game.type === type);
    renderGameList(filteredGames);
  });
});

// 页面加载完成后初始渲染
document.addEventListener("DOMContentLoaded", () => {
  renderGameList(games);
});
</script>
