<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperWave 超波 | 游戏资源空间站</title>
  <link rel="stylesheet" href="style.css">
  <!-- 引入LOGO（替换成你自己的图片链接） -->
  <link rel="icon" href="你的LOGO图片链接.ico">
</head>
<body>

<!-- 顶部导航栏 -->
<header class="hw-header">
  <div class="container">
    <div class="logo">
      <span class="logo-text">HYPERWAVE</span>
      <span class="logo-sub">超波</span>
    </div>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link active">首页</a>
      <a href="speed.html" class="nav-link">网速测试</a>
      <a href="#" class="nav-link">资源分类</a>
      <a href="#" class="nav-link">关于我们</a>
    </nav>
  </div>
</header>

<!-- 英雄区（带LOGO主视觉） -->
<section class="hw-hero">
  <div class="container">
    <div class="hero-content">
      <h1 class="hero-title">HyperWave 超波</h1>
      <p class="hero-desc">探索无限游戏宇宙，获取最新资源、MOD与补丁</p>
      <div class="hero-search">
        <input type="text" id="search" placeholder="搜索游戏 / MOD / 补丁...">
        <button class="search-btn">🔍 搜索</button>
      </div>
    </div>
  </div>
</section>

<!-- 分类导航 -->
<section class="hw-category">
  <div class="container">
    <button class="category-btn active" data-type="all">全部资源</button>
    <button class="category-btn" data-type="单机">单机游戏</button>
    <button class="category-btn" data-type="联机">联机游戏</button>
    <button class="category-btn" data-type="MOD">游戏MOD</button>
    <button class="category-btn" data-type="补丁">汉化补丁</button>
  </div>
</section>

<!-- 游戏资源列表 -->
<main class="container">
  <div class="hw-game-grid" id="gameList"></div>
</main>

<!-- 底部 -->
<footer class="hw-footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo">HYPERWAVE 超波</div>
      <p class="footer-desc">© 2025 HyperWave 超波 | 仅供学习交流使用，禁止商用</p>
      <div class="footer-links">
        <a href="#">隐私政策</a>
        <a href="#">使用条款</a>
        <a href="#">联系我们</a>
      </div>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
