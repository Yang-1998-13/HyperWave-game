            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: #05070a; /* 深邃黑色背景 */
            background-image: radial-gradient(circle at 30% 20%, rgba(100, 0, 255, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(0, 180, 255, 0.05) 0%, transparent 50%);
            color: #eef4ff;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.2rem 2rem;
        }

        /* ----- 导航栏 ----- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding: 0.8rem 0 1.5rem;
            border-bottom: 1px solid rgba(120, 180, 255, 0.15);
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #3b82f680;
        }

        .logo span {
            font-size: 1.3rem;
            font-weight: 400;
            background: linear-gradient(135deg, #a78bfa, #93c5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-left: 4px;
        }

        .nav-links {
            display: flex;
            gap: 2.2rem;
            font-weight: 500;
        }

        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.2s;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover {
            color: #a5b4fc;
            border-bottom-color: #818cf8;
            text-shadow: 0 0 10px #6366f1;
        }

        /* ----- Hero (搜索居中) ----- */
        .hero {
            margin: 3rem 0 2.5rem;
            text-align: center;
        }

        .hero h2 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
            text-shadow: 0 0 20px #8b5cf680;
        }

        .hero p {
            color: #9ca3af;
            font-size: 1.2rem;
            margin-bottom: 2.2rem;
            letter-spacing: 0.3px;
        }

        .search-wrapper {
            display: flex;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(15, 25, 40, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid #4f46e5;
            border-radius: 60px;
            padding: 0.2rem 0.2rem 0.2rem 1.8rem;
            align-items: center;
            box-shadow: 0 10px 30px -5px #00000080, 0 0 20px #3b82f640;
            transition: box-shadow 0.2s;
        }
        .search-wrapper:focus-within {
            border-color: #a78bfa;
            box-shadow: 0 0 25px #8b5cf6;
        }

        .search-wrapper i {
            color: #8b5cf6;
            font-size: 1.2rem;
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0.8rem;
            font-size: 1.1rem;
            color: white;
            outline: none;
        }

        .search-wrapper input::placeholder {
            color: #6b7280;
            font-weight: 300;
        }

        .search-wrapper button {
            background: linear-gradient(145deg, #4f46e5, #7c3aed);
            border: none;
            color: white;
            padding: 0.75rem 2.2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px #6366f1;
            letter-spacing: 0.5px;
            border: 1px solid #a78bfa;
        }

        .search-wrapper button:hover {
            background: linear-gradient(145deg, #6366f1, #8b5cf6);
            box-shadow: 0 0 25px #8b5cf6;
            transform: scale(1.02);
        }

        /* 分类区域 */
        .category-section {
            margin: 2.2rem 0 1.8rem;
        }

        .cat-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .cat-title i {
            color: #a78bfa;
            font-size: 1.4rem;
        }
        .cat-title span {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #93c5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .category-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem 0.8rem;
        }

        .cat-btn {
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid #4c51bf;
            color: #cbd5e1;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px #0000004d;
        }

        .cat-btn i {
            margin-right: 8px;
            color: #a5b4fc;
        }

        .cat-btn:hover {
            background: #3730a3;
            border-color: #818cf8;
            color: white;
            box-shadow: 0 0 15px #6366f1;
        }

        .cat-btn.active {
            background: linear-gradient(145deg, #6d28d9, #4f46e5);
            border-color: #c084fc;
            color: white;
            box-shadow: 0 0 20px #8b5cf6;
        }

        /* 游戏卡片网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem 1.5rem;
            margin: 2.5rem 0 3rem;
        }

        .game-card {
            background: rgba(12, 20, 32, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid #3b3f8c;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 15px 25px -8px #000000b3;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: #8b5cf6;
            box-shadow: 0 20px 30px -5px #000000e6, 0 0 25px #7c3aed80;
        }

        .card-img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            background: #0e1a26;
            border-bottom: 1px solid #4c51bf;
        }

        .card-content {
            padding: 1.3rem 1.2rem 1.4rem;
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .game-title span:first-child {
            background: linear-gradient(135deg, #e0e7ff, #b4c6fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .game-cat-badge {
            background: #1e1e4f;
            padding: 0.25rem 0.9rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #b4c6fc;
            border: 1px solid #6d28d9;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
        }

        .detail-btn {
            background: transparent;
            border: 1.8px solid #6d28d9;
            color: #c7d2fe;
            padding: 0.5rem 1.4rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            pointer-events: none; /* 卡片整体点击，但保留按钮样式 */
        }

        .detail-btn i {
            margin-left: 6px;
            font-size: 0.8rem;
        }

        /* 卡片悬停时按钮变色 */
        .game-card:hover .detail-btn {
            border-color: #a78bfa;
            color: #ede9fe;
            background: #4f46e520;
        }

        /* 模态框 —— 游戏详情 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.25s ease;
            padding: 1rem;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: #0b1322;
            border: 2px solid #4f46e5;
            border-radius: 36px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem 2.2rem;
            box-shadow: 0 30px 50px #000000, 0 0 0 1px #6366f180, 0 0 60px #8b5cf640;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: #6d28d9 #1e1e3f;
        }

        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 10px; }

        .modal-close {
            position: absolute;
            top: 1.5rem; right: 1.8rem;
            background: none;
            border: none;
            color: #a5b4fc;
            font-size: 2.2rem;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }
        .modal-close:hover { color: #c084fc; text-shadow: 0 0 20px #a78bfa; }

            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e0e7ff, #b4c6fc, #a78bfa);

            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            padding-right: 2rem;
        }

        .detail-section { margin: 1.8rem 0; }
        .detail-section h3 {
            color: #a78bfa;

            border-left: 6px solid #8b5cf6;
            padding-left: 1.2rem;
        }

            background: #0f1a2b;
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            border: 1px solid #4f46e5;

            white-space: pre-wrap;
            color: #cbd5e1;
        }

        .screenshots-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 10px;
        }
        .screenshot-thumb {
            width: 160px;
            height: 95px;
            object-fit: cover;
            border-radius: 14px;
            border: 2px solid #6d28d9;
            background: #0e1a26;
            transition: 0.2s;
        }
        .screenshot-thumb:hover {
            border-color: #a78bfa;
            transform: scale(1.02);
        }

        .download-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .download-btn {
            background: #1e1e4f;
            border: 1.5px solid #7c3aed;
            color: #e0e7ff;
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            box-shadow: 0 4px 8px #00000060;
        }
        .download-btn i { color: #a78bfa; font-size: 1.1rem; }
        .download-btn:hover {
            background: #2e1065;
            border-color: #c084fc;
            box-shadow: 0 0 20px #8b5cf6;
            color: white;
        }

        .footer-note {
            margin-top: 4rem;
            text-align: center;
            color: #6b7280;
            font-size: 0.95rem;
            border-top: 1px solid #1f2937;
            padding-top: 2.5rem;
        }
        .no-link-msg { color: #9ca3af; font-style: italic; }
    </style>
</head>

        // DOM
        const gridEl = document.getElementById('gamesGrid');
        const categoryContainer = document.getElementById('categoryContainer');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const modalOverlay = document.getElementById('gameModal');
        const modalBody = document.getElementById('modalBody');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // 辅助导航
        document.getElementById('speedTestBtn').addEventListener('click',(e)=>{e.preventDefault();alert('⚡ 网速测试开发中');});
        document.getElementById('resourceCatBtn').addEventListener('click',(e)=>{e.preventDefault();document.querySelector('.category-section').scrollIntoView({behavior:'smooth'});});
        document.getElementById('aboutBtn').addEventListener('click',(e)=>{e.preventDefault();alert('HYPERWAVE 超波 · 游戏资源站');});

        let currentCategory = '全部';
        let currentSearchTerm = '';
        const allCategories = ['全部', ...new Set(gamesData.map(g=>g.category))];

        function renderCategories(){
            categoryContainer.innerHTML = '';
            allCategories.forEach(cat=>{
                const btn = document.createElement('button');
                btn.className = `cat-btn ${currentCategory===cat?'active':''}`;
                btn.innerHTML = `<i class="fas fa-${cat==='全部'?'th-large':'gamepad'}"></i> ${cat}`;
                btn.addEventListener('click',()=>{ currentCategory=cat; renderCategories(); filterAndRender(); });
                categoryContainer.appendChild(btn);
            });
        }

        function getFilteredGames(){
            return gamesData.filter(g=> (currentCategory==='全部'||g.category===currentCategory) && (g.title.toLowerCase().includes(currentSearchTerm)||g.description.toLowerCase().includes(currentSearchTerm)));
        }

        function renderGames(){
            const filtered = getFilteredGames();
            if(!filtered.length){ gridEl.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#9ca3af;"><i class="fas fa-gamepad" style="font-size:3rem;opacity:0.5;"></i><p>没有找到游戏</p></div>`; return; }
            gridEl.innerHTML = filtered.map(g=>`
                <div class="game-card" data-game-id="${g.id}">
                    <img class="card-img" src="${g.cover||g.screenshots[0]}" alt="${g.title}">
                    <div class="card-content">
                        <div class="game-title"><span>${g.title}</span><span class="game-cat-badge"><i class="fas fa-tag"></i> ${g.category}</span></div>
                        <div class="card-actions"><span class="detail-btn">查看详情 <i class="fas fa-chevron-right"></i></span><i class="fas fa-download" style="color:#a78bfa;"></i></div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.game-card').forEach(card=>{
                card.addEventListener('click',(e)=>{
                    const id = parseInt(card.dataset.gameId);
                    const game = gamesData.find(g=>g.id===id);
                    if(game) openModal(game);
                });
            });
        }

        function filterAndRender(){ renderGames(); }

        function openModal(game){
            const screenshotsHtml = game.screenshots.map(u=>`<img class="screenshot-thumb" src="${u}">`).join('');
            const d=[];
            if(game.downloadLinks.quark) d.push(`<a href="${game.downloadLinks.quark}" target="_blank" class="download-btn"><i class="fab fa-quora"></i>夸克网盘</a>`);
            if(game.downloadLinks.baidu) d.push(`<a href="${game.downloadLinks.baidu}" target="_blank" class="download-btn"><i class="fab fa-google-drive"></i>百度网盘</a>`);
            if(game.downloadLinks.xunlei) d.push(`<a href="${game.downloadLinks.xunlei}" target="_blank" class="download-btn"><i class="fas fa-cloud-download-alt"></i>迅雷云盘</a>`);
            modalBody.innerHTML=`
                <div class="modal-game-title">${game.title}</div><p style="color:#cbd5e1;margin-bottom:1.5rem;">${game.description}</p>
                <div class="detail-section"><h3><i class="fas fa-image"></i> 游戏截图</h3><div class="screenshots-row">${screenshotsHtml||'<p>暂无截图</p>'}</div></div>
                <div class="detail-section"><h3><i class="fas fa-microchip"></i> 系统要求</h3><div class="sys-req">${game.systemReq.replace(/\n/g,'<br>')}</div></div>
                <div class="detail-section"><h3><i class="fas fa-download"></i> 下载地址</h3><div class="download-group">${d.length?d.join(''):'<span class="no-link-msg">暂无可用链接</span>'}</div></div>
            `;
            modalOverlay.classList.add('active'); document.body.style.overflow='hidden';
        }
        function closeModal(){ modalOverlay.classList.remove('active'); document.body.style.overflow=''; }
        closeModalBtn.addEventListener('click',closeModal);
        modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)closeModal();});
        function performSearch(){ currentSearchTerm=searchInput.value.trim(); filterAndRender(); }
        searchBtn.addEventListener('click',performSearch);
        searchInput.addEventListener('keypress',e=>{if(e.key==='Enter')performSearch();});
        window.addEventListener('keydown',e=>{if(e.key==='Escape'&&modalOverlay.classList.contains('active'))closeModal();});

        renderCategories(); renderGames();
    })();
