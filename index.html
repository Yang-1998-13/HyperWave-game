  <style>
    /* 全局样式重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }

    /* 全局变量 */
    :root {
      --bg-main: #0a0a14;
      --bg-card: #121224;
      --text-primary: #ffffff;
      --text-secondary: #999999;
      --accent-gradient: linear-gradient(90deg, #00d1ff, #a300ff);
      --border-radius: 12px;
    }

    /* 页面主体 */
    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* 顶部导航栏 */
    .hw-header {
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .hw-header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 16px;
      color: var(--text-secondary);
    }

    .nav-menu {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .nav-link {
      color: var(--text-primary);
      text-decoration: none;
      font-size: 16px;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-link.active {
      color: #00d1ff;
    }

    .nav-link:hover {
      color: #00d1ff;
    }

    .nav-link.active::after {
      content: "";
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-gradient);
      border-radius: 2px;
    }

    /* 下拉菜单 */
    .dropdown {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: 120%;
      left: 0;
      background: var(--bg-card);
      border-radius: var(--border-radius);
      padding: 10px 0;
      min-width: 150px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      display: none;
      z-index: 999;
      border: 1px solid rgba(0,209,255,0.2);
    }

    .dropdown:hover .dropdown-menu {
      display: block;
    }

    .dropdown-menu a {
      display: block;
      padding: 8px 20px;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .dropdown-menu a:hover {
      background: rgba(0,209,255,0.1);
      color: #00d1ff;
    }

    /* 英雄区 */
    .hw-hero {
      padding: 60px 0;
      text-align: center;
    }

    .hero-title {
      font-size: 48px;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .hero-desc {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }

    .hero-search {
      display: flex;
      max-width: 600px;
      margin: 0 auto;
      gap: 10px;
    }

    #search {
      flex: 1;
      padding: 15px 20px;
      background: var(--bg-card);
      border: 1px solid rgba(0,209,255,0.2);
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    #search:focus {
      border-color: #00d1ff;
      box-shadow: 0 0 10px rgba(0,209,255,0.2);
    }

    .search-btn {
      padding: 15px 30px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 30px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0,209,255,0.5);
    }

    /* 分类导航 */
    .hw-category {
      padding: 20px 0;
      margin-bottom: 40px;
    }

    .hw-category .container {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 10px 25px;
      background: var(--bg-card);
      border: 1px solid rgba(0,209,255,0.2);
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;

    .category-btn.active {
      background: var(--accent-gradient);
      color: white;
      border-color: transparent;
    }

    .category-btn:hover:not(.active) {
      border-color: #00d1ff;
      color: #00d1ff;
    }

    /* 游戏列表网格 */
    .hw-game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      padding: 20px 0 60px;
    }

    /* 游戏卡片 */
    .game-card {
      background: var(--bg-card);
      border-radius: var(--border-radius);
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1px solid rgba(0,209,255,0.1);

      box-shadow: 0 10px 30px rgba(0,209,255,0.15);

      width: 100%;
      height: 180px;
      object-fit: cover;
      border-bottom: 1px solid rgba(255,255,255,0.1);

      margin-bottom: 10px;

      background: rgba(0,209,255,0.1);

      border-radius: 12px;

      margin-bottom: 15px;

      font-size: 16px;

      cursor: pointer;

    }

    .footer-links a:hover {
      color: #00d1ff;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

// DOM元素获取
var gameList = document.getElementById("gameList");

// 渲染游戏列表
function renderGameList(filteredGames) {
  gameList.innerHTML = "";
  if (!filteredGames || filteredGames.length === 0) {
    gameList.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-size: 18px; padding: 50px 0;'>暂无相关资源</p>";
    return;
  }
  for (var i = 0; i < filteredGames.length; i++) {
    var game = filteredGames[i];
    var card = document.createElement("div");
    card.className = "game-card";
    card.innerHTML = 
      '<img src="' + game.cover + '" alt="' + game.title + '" class="game-cover" loading="lazy">' +
      '<div class="game-info">' +
        '<h3 class="game-title">' + game.title + '</h3>' +
        '<span class="game-type">' + game.type + '</span>' +
        '<button class="download-btn" onclick="openDetail(\'' + game.title.replace(/'/g, "\\'") + '\')">查看详情</button>' +
      '</div>';
    gameList.appendChild(card);
  }
}

// 打开详情弹窗
function openDetail(gameTitle) {
  var game = null;
  for (var i = 0; i < games.length; i++) {
    if (games[i].title === gameTitle) {
      game = games[i];
      break;
    }
  }
  if (!game) return;

  // 移除旧弹窗
  var existingModal = document.querySelector(".game-detail-modal");
  if (existingModal) existingModal.remove();

  // 创建弹窗
  var modal = document.createElement("div");
  modal.className = "game-detail-modal";
  modal.style.cssText = "position: fixed;top: 0;left: 0;width: 100%;height: 100%;background: rgba(0, 0, 0, 0.9);z-index: 99999;display: flex;align-items: center;justify-content: center;padding: 20px;animation: fadeIn 0.3s ease;";

  var box = document.createElement("div");
  box.style.cssText = "background: var(--bg-card);max-width: 700px;width: 100%;border-radius: 20px;padding: 35px;position: relative;border: 1px solid rgba(0, 209, 255, 0.5);box-shadow: 0 0 40px rgba(0, 209, 255, 0.3);";

  box.innerHTML = 
    '<h2 style="font-size: 28px; font-weight: 900; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px;">' + game.title + '</h2>' +
    '<p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;">【' + game.type + '】</p>' +
    '<p style="color: var(--text-primary); line-height: 1.8; margin-bottom: 30px; font-size: 16px;">' + game.desc + '</p>' +
    '<a href="' + game.download + '" target="_blank" style="display: inline-block; padding: 14px 30px; background: var(--accent-gradient); color: var(--text-primary); border-radius: 30px; text-decoration: none; font-weight: 700; font-size: 16px; transition: all 0.3s ease;">立即下载</a>' +
    '<button onclick="this.closest(\'.game-detail-modal\').remove()" style="position: absolute; right: 25px; top: 25px; background: rgba(255,255,255,0.1); color: var(--text-primary); border: 1px solid rgba(0,209,255,0.3); padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease;">关闭</button>';

  modal.appendChild(box);
  document.body.appendChild(modal);

  // 点击遮罩关闭
  modal.onclick = function(e) {
    if (e.target === modal) modal.remove();
  };

  // 按钮hover效果
  var closeBtn = box.querySelector("button");
  closeBtn.onmouseenter = function() {
    closeBtn.style.background = "rgba(0,209,255,0.2)";
  };
  closeBtn.onmouseleave = function() {
    closeBtn.style.background = "rgba(255,255,255,0.1)";
  };

  var downloadBtn = box.querySelector("a");
  downloadBtn.onmouseenter = function() {
    downloadBtn.style.transform = "translateY(-2px)";
    downloadBtn.style.boxShadow = "0 0 20px rgba(0,209,255,0.5)";
  };
  downloadBtn.onmouseleave = function() {
    downloadBtn.style.transform = "translateY(0)";
    downloadBtn.style.boxShadow = "none";
  };
}

// 搜索功能
searchInput.oninput = function() {
  var keyword = searchInput.value.toLowerCase().trim();
  var filteredGames = [];
  for (var i = 0; i < games.length; i++) {
    var game = games[i];
    if (game.title.toLowerCase().indexOf(keyword) !== -1 || game.type.toLowerCase().indexOf(keyword) !== -1) {
      filteredGames.push(game);
    }
  }
  renderGameList(filteredGames);
  
  // 重置分类按钮
  for (var j = 0; j < categoryBtns.length; j++) {
    categoryBtns[j].classList.remove("active");
  }
  document.querySelector('.category-btn[data-type="all"]').classList.add("active");
};

// 分类按钮筛选
for (var k = 0; k < categoryBtns.length; k++) {
  categoryBtns[k].onclick = function() {
    // 重置激活状态
    for (var m = 0; m < categoryBtns.length; m++) {
      categoryBtns[m].classList.remove("active");
    }
    this.classList.add("active");
    
    var type = this.dataset.type;
    var filteredGames = [];
    if (type === "all") {
      filteredGames = games;
    } else {
      for (var n = 0; n < games.length; n++) {
        if (games[n].type === type) {
          filteredGames.push(games[n]);
        }
      }
    }
    renderGameList(filteredGames);
  };
}

// 下拉菜单筛选
for (var p = 0; p < dropdownLinks.length; p++) {
  dropdownLinks[p].onclick = function(e) {
    e.preventDefault();
    var type = this.dataset.type;
    
    // 同步分类按钮
    for (var q = 0; q < categoryBtns.length; q++) {
      if (categoryBtns[q].dataset.type === type) {
        categoryBtns[q].classList.add("active");
      } else {
        categoryBtns[q].classList.remove("active");
      }
    }
    
    // 筛选游戏
    var filteredGames = [];
    if (type === "all") {
      filteredGames = games;
    } else {
      for (var r = 0; r < games.length; r++) {
        if (games[r].type === type) {
          filteredGames.push(games[r]);
        }
      }
    }
    renderGameList(filteredGames);
  };
}

// 页面加载完成后渲染
window.onload = function() {
  renderGameList(games);
};

// 兜底渲染
renderGameList(games);
</script>

</body>
</html>
