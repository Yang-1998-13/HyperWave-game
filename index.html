<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperWave 超波 | 游戏资源空间站</title>
  <style>
    /* 全局基础样式 */
    :root {
      --bg-primary: #0c0c14;
      --bg-card: #12121a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --accent-blue: #00d1ff;
      --accent-purple: #9d00ff;
      --accent-gradient: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    .container {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* 头部样式 */
    .hw-header {
      padding: 20px 0;
      border-bottom: 1px solid rgba(0, 209, 255, 0.1);
      position: sticky;
      top: 0;
      background-color: var(--bg-primary);
      z-index: 999;
    }
    
    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    
    .logo-text {
      font-size: 24px;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .logo-sub {
      font-size: 16px;
      color: var(--text-secondary);
    }
    
    .hw-header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .nav-menu {
      display: flex;
      gap: 30px;
      align-items: center;
    }
    
    .nav-link {
      color: var(--text-primary);
      text-decoration: none;
      font-size: 16px;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .nav-link.active {
      color: var(--accent-blue);
    }
    
    .nav-link:hover {
      color: var(--accent-blue);
    }
    
    /* 下拉菜单样式 */
    .dropdown {
      position: relative;
    }
    
    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background-color: var(--bg-card);
      border: 1px solid rgba(0, 209, 255, 0.2);
      border-radius: 10px;
      padding: 10px 0;
      min-width: 150px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: none;
      z-index: 9999;
    }
    
    .dropdown:hover .dropdown-menu {
      display: block;
    }
    
    .dropdown-menu a {
      display: block;
      padding: 10px 20px;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.3s ease;
    }
    
    .dropdown-menu a:hover {
      background-color: rgba(0, 209, 255, 0.1);
      color: var(--accent-blue);
    }
    
    /* 英雄区样式 */
    .hw-hero {
      padding: 60px 0;
      text-align: center;
    }
    
    .hero-title {
      font-size: 48px;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }
    
    .hero-desc {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }
    
    .hero-search {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }
    
    #search {
      flex: 1;
      padding: 15px 20px;
      border-radius: 30px;
      border: 1px solid rgba(0, 209, 255, 0.2);
      background-color: var(--bg-card);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
    }
    
    #search:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 15px rgba(0, 209, 255, 0.2);
    }
    
    .search-btn {
      padding: 15px 30px;
      border-radius: 30px;
      border: none;
      background: var(--accent-gradient);
      color: var(--text-primary);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(0, 209, 255, 0.3);
    }
    
    /* 分类栏样式 */
    .hw-category {
      padding: 20px 0;
      border-top: 1px solid rgba(0, 209, 255, 0.1);
      border-bottom: 1px solid rgba(0, 209, 255, 0.1);
      margin-bottom: 40px;
    }
    
    .category-btn {
      padding: 8px 20px;
      margin: 0 5px;
      border-radius: 20px;
      border: 1px solid rgba(0, 209, 255, 0.2);
      background-color: transparent;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .category-btn.active {
      background: var(--accent-gradient);
      border-color: transparent;
      color: var(--text-primary);
    }
    
    .category-btn:hover:not(.active) {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }
    
    /* 游戏列表样式 */
    .hw-game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      margin-bottom: 60px;
    }
    
    .game-card {
      background-color: var(--bg-card);
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid rgba(0, 209, 255, 0.1);
      transition: all 0.3s ease;
    }
    
    .game-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 209, 255, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .game-cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    
    .game-info {
      padding: 20px;
    }
    
    .game-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-primary);
    }
    
    .game-type {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 10px;
      background-color: rgba(0, 209, 255, 0.1);
      color: var(--accent-blue);
      font-size: 12px;
      margin-bottom: 15px;
    }
    
    .download-btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--accent-gradient);
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .download-btn:hover {
      box-shadow: 0 0 15px rgba(0, 209, 255, 0.2);
    }
    
    /* 弹窗动画 */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* 底部样式 */
    .hw-footer {
      padding: 40px 0;
      border-top: 1px solid rgba(0, 209, 255, 0.1);
      margin-top: 60px;
    }
    
    .footer-content {
      text-align: center;
    }
    
    .footer-logo {
      font-size: 20px;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
    }
    
    .footer-desc {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 20px;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    
    .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .footer-links a:hover {
      color: var(--accent-blue);
    }
    
    /* 响应式适配 */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 36px;
      }
      .hero-desc {
        font-size: 16px;
      }
      .nav-menu {
        gap: 15px;
      }
      .logo-text {
        font-size: 20px;
      }
      .logo-sub {
        font-size: 16px;
      }
      .hw-game-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }
      .dropdown-menu {
        right: auto;
        left: 0;
      }
    }
  </style>
</head>
<body>

</body>
