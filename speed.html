</head>
<body>

      <span class="logo-text">HYPERWAVE</span>

    </div>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link">首页</a>
      <a href="speed.html" class="nav-link active">网速测试</a>
      <div class="dropdown">
        <a href="#" class="nav-link dropdown-toggle">资源分类</a>
        <div class="dropdown-menu">
          <a href="index.html" data-type="all">全部资源</a>
          <a href="index.html" data-type="动作">动作</a>
          <a href="index.html" data-type="冒险">冒险</a>
          <a href="index.html" data-type="射击">射击</a>
          <a href="index.html" data-type="休闲">休闲</a>
          <a href="index.html" data-type="体育">体育</a>
          <a href="index.html" data-type="竞速">竞速</a>
          <a href="index.html" data-type="恐怖">恐怖</a>
        </div>
      </div>
      <a href="about.html" class="nav-link">关于我们</a>
    </nav>
  </div>
</header>

<!-- 测速主体 -->
<main class="container speed-container">
  <div class="speed-card">
    <h2 class="speed-title">HyperWave 网速测试</h2>
    <p class="speed-desc">测试当前网络下载速度，选择最佳资源下载节点</p>
    
    <div class="speed-display">
      <span class="speed-value" id="speedValue">--</span>
      <span class="speed-unit" id="speedUnit">MB/s</span>
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div class="speed-status" id="speedStatus">点击下方按钮开始测试</div>
    
    <button class="speed-btn" id="testBtn">开始测试</button>
  </div>
</main>

<!-- 底部（和主页一致） -->
<footer class="hw-footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo">HYPERWAVE 超波</div>
      <p class="footer-desc">© 2025 HyperWave 超波 | 仅供学习交流使用，禁止商用</p>
      <div class="footer-links">
        <a href="#">隐私政策</a>
        <a href="#">使用条款</a>
        <a href="about.html">联系我们</a>
      </div>
    </div>
  </div>
</footer>

<script>
  // 测速核心逻辑（彻底修复跨域版）
  const testBtn = document.getElementById("testBtn");
  const speedValue = document.getElementById("speedValue");
  const speedUnit = document.getElementById("speedUnit");
  const progressFill = document.getElementById("progressFill");
  const speedStatus = document.getElementById("speedStatus");

  // 用GitHub同源CDN资源，彻底解决跨域
  const testFileUrl = "https://github.githubassets.com/images/modules/site/home/globe.jpg";

  testBtn.addEventListener("click", async () => {
    // 测试中状态
    testBtn.disabled = true;
    testBtn.textContent = "测试中...";
    speedValue.textContent = "--";
    speedStatus.textContent = "正在连接服务器...";
    progressFill.style.width = "20%";

    try {
      const startTime = performance.now();
      
      // 添加超时机制 + 缓存禁用
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);

      const response = await fetch(testFileUrl, {
        mode: "cors",
        cache: "no-store",
        signal: controller.signal
      });

      clearTimeout(timeoutId);

      if (!response.ok) throw new Error(`HTTP错误: ${response.status}`);

      // 真实读取响应长度，精准计算
      const blob = await response.blob();
      const actualSizeMB = (blob.size / (1024 * 1024)).toFixed(2);
      
      const endTime = performance.now();
      const durationSeconds = (endTime - startTime) / 1000;
      
      // 精准速度计算（MB/s）
      const speedMBps = (actualSizeMB / durationSeconds).toFixed(2);
      
      // 更新UI
      progressFill.style.width = "100%";
      speedValue.textContent = speedMBps;
      speedStatus.textContent = `测试完成！当前下载速度约 ${speedMBps} MB/s`;
      
      // 根据速度给出提示
      if (speedMBps >= 10) {
        speedStatus.textContent += " | 网络极佳，可高速下载";
      } else if (speedMBps >= 5) {
        speedStatus.textContent += " | 网络良好，可正常下载";
      } else {
        speedStatus.textContent += " | 网络较慢，建议切换节点";
      }

    } catch (error) {
      console.error("测速错误:", error);
      speedValue.textContent = "错误";
      speedStatus.textContent = "网络异常，请检查网络后重试";
      progressFill.style.width = "0%";
    } finally {
      testBtn.disabled = false;
      testBtn.textContent = "重新测试";
      // 重置进度条
      setTimeout(() => {
        progressFill.style.width = "0%";
      }, 2000);
    }
  });

  // 测速页专属样式
  const speedStyle = document.createElement("style");
  speedStyle.textContent = `
    .speed-container {
      min-height: calc(100vh - 180px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 0;
    }
    .speed-card {
      background: var(--bg-card);
      border: 1px solid rgba(0, 209, 255, 0.3);
      border-radius: 20px;
      padding: 50px 40px;
      width: 100%;
      max-width: 550px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 209, 255, 0.15);
    }
    .speed-title {
      font-size: 32px;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .speed-desc {
      color: var(--text-secondary);
      font-size: 16px;
      margin-bottom: 30px;
    }
    .speed-display {
      margin: 30px 0;
    }
    .speed-value {
      font-size: 64px;
      font-weight: 900;
      color: var(--accent-blue);
      line-height: 1;
    }
    .speed-unit {
      font-size: 24px;
      color: var(--text-secondary);
      margin-left: 10px;
    }
    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(18, 18, 26, 0.8);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid rgba(0, 209, 255, 0.2);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-gradient);
      transition: width 0.5s ease;
      border-radius: 10px;
    }
    .speed-status {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 30px;
    }
    .speed-btn {
      padding: 15px 40px;
      border-radius: 30px;
      border: none;
      background: var(--accent-gradient);
      color: var(--text-primary);
      font-size: 18px;
字体粗细：700;
光标：指针;
过渡：所有 0.3秒 线性;
    }
    .speed-btn:disabled {
背景：#333;
光标：不允许;
阴影：无;
    }
    .speed-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 0 25px rgba(0, 209, 255, 0.4);
    }
  `;
  document.head.appendChild(speedStyle);

  // 下拉菜单点击跳转首页筛选
  document.querySelectorAll('.dropdown-menu a').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const type = 链接.dataset.type;
      window.location.href = `index.html?type=${type}`;
    });
  });
</script>

</body>
